# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'hiv_project'
version: '1.0.0'
config-version: 2


# This setting configures which "profile" dbt uses for this project.
profile: 'hiv_project'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

models:
  hiv_project:
    # Default schema setting for all models
    # +schema: hiv
    
    # Staging models use the existing "stg" schema
    staging:
      +schema: stg
      +materialized: view
      
    # Intermediate models for transformation steps
    intermediate:
      +schema: stg
      +materialized: ephemeral
      
    # Final models in the hiv schema
    mart:
      # +schema: hiv
      +materialized: table
      
    # Keep example directory configuration
    example:
      +materialized: view

seeds:
  hiv_project:
    +schema: stg
    seed_rpt_HIVReportName:
      +column_types:
        ReportViewName: varchar(200)
        ReportViewId: varchar(100)
        ReportSequence: tinyint
        ReportUri: varchar(200)
        ReportUriHeader: varchar(200)
        PackageType: varchar(10)